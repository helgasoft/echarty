# Workflow for building and uploading a WebAssembly R package image to a GitHub Release
# Adapted from: https://github.com/r-wasm/actions/blob/main/.github/workflows/release-file-system-image.yml
name: Build and release WebAssembly image

on:
  # Trigger this workflow when you publish a new GitHub Release
  release:
    types: [published]

  # Allow manual triggering from the Actions tab for testing
  workflow_dispatch:
    inputs:
      packages:
        description: 'R packages to include (space or comma separated). Defaults to "." (current package)'
        required: false
        default: 'dplyr, htmlwidgets, data.tree'
        type: string
      strip:
        description: 'Directories to strip from the image (e.g., "demo, doc, examples"). Use "NULL" for none.'
        required: false
        default: 'demo, man, pkgdown, tests, vignettes'
        type: string
      webr-image:
        description: 'webR Docker image to use for building'
        required: false
        default: 'ghcr.io/r-wasm/webr:main'
        type: string
      compress:
        description: 'Compress the Emscripten VFS image'
        required: false
        default: false
        type: boolean

# Allow only one concurrent build for a given release tag
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: true



# Simplified version from release-file-system-image.yml
jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # name: Validate event is release is REMOVED
      - name: Checkout calling repository
        uses: actions/checkout@v4

      - name: Checkout r-wasm/actions repository
        uses: actions/checkout@v4
        with:
          ref: v1
          repository: r-wasm/actions
          token: ${{ secrets.GITHUB_TOKEN }}
          path: .actions

      #- name: Find `Config/Needs/wasm` in DESCRIPTION

      - name: Build wasm image
        uses: ./.actions/build-rwasm
        with:
          packages: |
            ${{ inputs.packages }}
      #      ${{ steps.needs.outputs.pkg }}
          strip: ${{ inputs.strip }}
          image-path: ._rwasm
          webr-image: ${{ inputs.webr-image }}

      - name: Upload wasm image to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "._rwasm/*"
          tag: ${{ github.ref }}
          file_glob: true
          overwrite: true



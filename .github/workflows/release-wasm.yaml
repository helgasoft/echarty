# Workflow for building and uploading a WebAssembly R package image to a GitHub Release
# Adapted from: https://github.com/r-wasm/actions/blob/main/.github/workflows/release-file-system-image.yml
name: Build and release WebAssembly image

on:
  # Trigger this workflow when you publish a new GitHub Release
  release:
    types: [published]

  # Allow manual triggering from the Actions tab for testing
  workflow_dispatch:
    inputs:
      packages:
        description: 'R packages to include (space or comma separated). Defaults to "." (current package)'
        required: false
        default: '.'
        type: string
      strip:
        description: 'Directories to strip from the image (e.g., "demo, doc, examples"). Use "NULL" for none.'
        required: false
        default: 'demo, man, pkgdown, tests, vignettes, doc, examples, help, html'
        type: string
      webr-image:
        description: 'webR Docker image to use for building'
        required: false
        default: 'ghcr.io/r-wasm/webr:main'
        type: string
      compress:
        description: 'Compress the Emscripten VFS image'
        required: false
        default: false
        type: boolean

# Allow only one concurrent build for a given release tag
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: true



# Simplified version with hardcoded options
jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wasm image using webR Docker container
        uses: addnab/docker-run-action@v3
        with:
          image: ghcr.io/r-wasm/webr:main
          options: |
            -v ${{ github.workspace }}:/work
            -w /work
          run: |
            Rscript -e "
              library(rwasm)
              
              # Create directories
              dir.create('./lib', showWarnings = FALSE)
              dir.create('./repo', showWarnings = FALSE)
              
              # Build current package with standard stripping
              make_library(
                repo_dir = './repo',
                lib_dir = './lib',
                strip = c('demo', 'man', 'pkgdown', 'tests', 'vignettes')
              )
              
              message('✓ Build complete')
              print(list.files('./lib', recursive = TRUE))
            "

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: './lib/*'
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          file_glob: true
